function fmtNum(n) {

document.getElementById('s-total').textContent    = s.total_cities??'—';
document.getElementById('s-complete').textContent = s.complete??'—';
document.getElementById('s-inprog').textContent   = s.in_progress??'—';
document.getElementById('s-images').textContent   = fmtNum(s.total_images);

(DATA.cities||[]).forEach(c => {
  const color = STATUS_COLOR[c.status]||'#6c757d';
  const popup = '<b>'+c.city+'</b><br>'+c.country+'<br>'
    +'状态: '+(STATUS_LABEL[c.status]||c.status)+'<br>'
    +'Panoids: '+fmtNum(c.panoids_downloaded)+' / '+fmtNum(c.panoids_total)+'<br>'
    +'图像: ≈'+fmtNum(c.panoids_downloaded*4)+'<br>'
    +'Step 4: '+c.step4_pct+'%&ensp;Step 5: '+c.step5_pct+'%';
  L.circleMarker([c.lat,c.lon],
    {radius:9,color,fillColor:color,fillOpacity:.85,weight:2}
  ).addTo(map).bindPopup(popup);
});

// UCDB 边界叠加层（按状态着色，缩放后可见城市真实轮廓）
L.geoJSON(BOUNDARIES, {
  style: f => ({
    color: STATUS_COLOR[f.properties.status]||'#6c757d',
    weight: 2, fillColor: STATUS_COLOR[f.properties.status]||'#6c757d', fillOpacity: 0.18
  }),
  onEachFeature: (f, l) => {
    const p = f.properties;
    l.bindPopup('<b>'+p.city+'</b><br>'+p.country+'<br>UCDB 边界'
      + (p.area_km2 ? '<br>面积: '+p.area_km2+' km²' : '')
      + '<br>状态: '+(STATUS_LABEL[p.status]||p.status));
  }
}).addTo(map);

const tbody = document.getElementById('city-tbody');
tbody.innerHTML = (DATA.cities||[]).map(c => {
  const s4col = c.step4_pct>=100?'#198754':'#0dcaf0';
  const s5col = c.step5_pct>=100?'#198754':'#0d6efd';
  const panStr = c.db_ready
    ? '<span class="text-success">'+fmtNum(c.panoids_downloaded)+'</span>'
      +'<span class="text-secondary"> / '+fmtNum(c.panoids_total)+'</span>'
    : '<span style="color:#6c757d;font-style:italic;font-size:.78rem">—</span>';
  return '<tr>'
    +'<td><span class="fw-semibold">'+c.city+'</span>'
        +'<br><small class="text-secondary">'+c.country+'</small></td>'
    +'<td class="text-center">'+stepPill(c.step1)+stepPill(c.step2)+stepPill(c.step3)+'</td>'
    +'<td>'+bar(c.step4_pct,s4col)+'</td>'
    +'<td>'+bar(c.step5_pct,s5col)+'</td>'
    +'<td class="text-end num" style="font-size:.85rem">'+panStr+'</td>'
    +'<td class="text-end num" style="font-size:.85rem">'+fmtNum(c.panoids_downloaded*4)+'</td>'
    +'<td><span class="badge badge-'+c.status+'">'+(STATUS_LABEL[c.status]||c.status)+'</span></td>'
    +'</tr>';
}).join('');
</script>
</body>
</html>
